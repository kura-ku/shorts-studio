name: collect-youtube-trends

on:
  schedule:
    - cron: '0 * * * *'

  workflow_dispatch:

jobs:

  collect:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5

        with:
          python-version: '3.11'

      - name: Install Libraries
        run: |

          pip install yt-dlp
          pip install pandas

      - name: Run Collector
        run: |

          python python/collect/youtube_trends.py

      - name: Commit CSV
        run: |

          git config user.name github-actions
          git config user.email github-actions@github.com

          git add .

          git commit -m "update trends" || echo "no changes"

          git push
